# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing these this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Virtual Worlds Online Models
tagline: Virtual Worlds Online Models
email: graham.stark@virtual-worlds.scot
description: > # this means to ignore newlines until "baseurl:"
  Virtual Worlds Online Models
baseurl: "/" # the subpath of your site, e.g. /blog
url: "http://models.virtual-worlds.scot/" # the base hostname & protocol for your site, e.g. http://example.com
github_username:  grahamstark

# sizes for generated SVG images.
svg_height: 625
svg_width: 1008
svg_viewBox: 0 0 2100 1297

svg_width_long: 2016
svg_height_long: 1250
svg_viewBox_long: 0 0 2100 2558

svg_height_thumb: 120
svg_width_thumb: 200
svg_viewBox_thumb: 0 0 300 400

svg_height_wide: 1250
svg_width_wide: 1008
svg_viewBox_wide: 0 0 4200 1297
# We also maybe need a wide one ..

# Build settings
markdown: kramdown
# theme: minima
plugins:
  - jekyll-feed
exclude:
  - Gemfile
  - Gemfile.lock
sass:
    sass_dir: _sass  
