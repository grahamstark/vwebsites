<!DOCTYPE html>

<html lang='en-GB'>

<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta charset="UTF-8">
    <title>Virtual Worlds Online Models | Scotben Mini 2026</title>

    <link rel="icon" href="/images/favicon.ico?v=2.0.0" type="image/x-icon">
    <link rel="stylesheet" href="/css/stb-bootstrap.css">
    <link rel="stylesheet" href="/css/bootstrap-icons.css">

    <script src='/js/jquery.js'></script>
    <script src='/js/jquery.periodicalupdater.js'></script>
    <script src='/js/jquery.validate.js'></script>
    <script src='/js/jquery.number.js'></script>
    <script src="/js/bootstrap.bundle.js"></script>
    <script src="/js/mustache.min.js"></script>
    <style>
        .bg-purple {background:#cdf;}
        .bg-orange {background:#fec;}
        .modcon:hover {filter:brightness(0.6);}
    </style>
</head>
                                              


<body class='text-primary p-2'>


<header role='header' class='box'>
    <h1>Scotben Mini 2026</h1>
</header>

<header role='header' class='box'>
    <h2>Inputs</h2>
</header>

<form id='mainform' action="thing" method="POST">

    <input type='hidden' id='scotben-uid' name='scotben-uid' value='-1' />

</form>

<div class='row fs-5 justify-content-center text-primary pt-3 pb-3'>

    <div class='col hover-highlight'
        data-bs-toggle='modal'
        data-bs-target='#gainlose-popup'>

        <h4>Gainers and Losers</h4>
        <table class='table table-sm align-middle'>
            <tr>
                <th>Gaining:</th><td class='text-success' id='headlines-gainers'></td>
            </tr>
            <tr>
                <th>Losing:</th><td class='text-danger' id='headlines-losers'></td>
            </tr>
            <tr>
                <th>Unchanged:</th><td class='' id='headlines-nochange'></td>
            </tr>
        </table>
        <p class='text-info fs-6'>These are counts of people living in households whose net income has increased, decreased, or stayed the same.</p>
    </div>
</div>

<div class='modal fade' id='gainlose-popup' tabindex='-1' role='dialog' aria-labelledby='crosstab-label' aria-hidden='true'>
    <div class='modal-content modal-dialog modal-xl'  role='document'>
        <div class='modal-header'>
            <h3  class='modal-title' >Gainers and Losers</h3>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class='modal-body'>
                <div id='gain-lose-summary'></div>
                <h4>Gains By Income Decile</h4>

<figure >
    <svg id='img-deciles' height="625" width='1008' viewBox="0 0 2100 1297"></svg>
    <figcaption class='text-info fs-6'>The household population of Scotland grouped into tenths by income, from poorest to richest, and the average change in £s per week for each group.
    </figcaption>
</figure>

                <h4>Tables of Gainers and Losers</h4>
<figure >
    <div id='tab-children_gl'></div>
    <figcaption class='text-info fs-6'>Counts of Gainers and Losers By Number of Children</figcaption>
</figure>

<figure >
    <div id='tab-hhtype_gl'></div>
    <figcaption class='text-info fs-6'>Counts of Gainers and Losers By Household Size</figcaption>
</figure>


<figure >
    <div id='tab-ten_gl'></div>
    <figcaption class='text-info fs-6'>Counts of Gainers and Losers By Tenure</figcaption>
</figure>


<figure >
    <div id='tab-dec_gl'></div>
    <figcaption class='text-info fs-6'>Counts of Gainers and Losers By Equivalent Income Decile</figcaption>
</figure>

        </div> <!-- modal body -->
    </div> <!-- modal content -->
</div><!-- hidden div -->




<script>

const UID =  -1;
const MODEL = "scotben";
const EDITION = "simple-2026a";
const SUBSYS = "SimpleParams";

/*
 * General Purpose stuff
 *
 */

const BIG_A = 9999999999;

const API = "http://microapi-local/";

function getUID(){
    var uid = localStorage.getItem( "scotben-uid");
    console.log( "got uid from local storage as " + uid + "; datatype is " + typeof(uid));
    if((! uid )||(uid == 'undefined')){
        uid = $( "#scotben-uid" ).val();
        console.log( "getUID; retrieving from input field; set to " + uid );
        if(! uid ){
            localStorage.setItem( "scotben-uid", uid );
        }
    }
    console.log( "getUID; got id as ", uid );
    return uid;
}

function setUID( uid ){
    // localStorage.setItem( "uid", uid );
    $( "#uid" ).val( uid );
    localStorage.setItem("scotben-uid", uid );
}


async function get_output_item( uid, item, datatype ){
    const url = [API,"output","fetch",MODEL,EDITION,datatype,item].join("/") + "?uid="+uid;
    console.log( "get_output_item; fetching " + url );
    itemid = datatype == 'svg' ? 'img-' + item : 'tab-' + item; // FIXME expand this jason at least
    console.log( "writing to " + itemid );
    await fetch(url)
        .then( response=>response.text())
        .then( data => {
            // console.log(data);
            // $("#"+itemid).val( data );
            const container = document.getElementById(itemid);
            container.innerHTML = data;
        });
}

async function get_output( uid ){
    await get_output_item( uid, 'children_gl', 'html');
    await get_output_item( uid, 'hhtype_gl', 'html');
    await get_output_item( uid, 'ten_gl', 'html');
    await get_output_item( uid, 'dec_gl', 'html');
    await get_output_item( uid, 'deciles', 'svg');
}


async function initialise(){
    var uid = null;
    uid = getUID();
    // initial parameters
    const url = [API,"params","get",MODEL,EDITION,SUBSYS].join("/") + "?uid="+uid;
    console.log( "initialise; fetching " + url )
    await fetch(url)
        .then( response=>response.json())
        .then( data => {
            console.log("fetch params got data as " + data.uid);
            if(uid != data.uid){
                uid = data.uid;
                setUID( uid );
            }
    });
    console.log( "uid=" + uid );
    await get_output( uid );
}


$(document).ready(function(){
    // load default params ..
    console.log( "ready - initialise")
    initialise();
});

</script>

</body>

</html>
